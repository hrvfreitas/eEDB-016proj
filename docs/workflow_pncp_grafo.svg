<svg width="680" height="773" viewBox="0 0 680 773" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
<title>Application Workflow Diagram — auditoria de rede PNCP em grafo</title>
<desc>Fluxo vertical mostrando a jornada do auditor desde a busca inicial até a geração de relatório de risco, passando por consultas diretas (Q1, Q2) e consultas de travessia de relacionamentos no grafo (Q3 a Q7).</desc>

<rect x="0" y="0" width="680" height="773" fill="#FFFFFF"/>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="170" y="44" width="14" height="14" rx="3" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="192" y="55" font-size="12" fill="#444441">Consulta direta</text>
<rect x="400" y="44" width="14" height="14" rx="3" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
<text x="422" y="55" font-size="12" fill="#444441">Travessia de relacionamentos</text>

<rect x="160" y="75" width="360" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="93" font-size="14" font-weight="500" fill="#2C2C2A" text-anchor="middle" dominant-baseline="central">Auditor inicia consulta</text>
<text x="340" y="111" font-size="12" fill="#5F5E5A" text-anchor="middle" dominant-baseline="central">Seleciona órgão ou fornecedor</text>

<line x1="340" y1="131" x2="340" y2="161" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="160" y="161" width="360" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="179" font-size="14" font-weight="500" fill="#085041" text-anchor="middle" dominant-baseline="central">Q1 — Contratos do órgão</text>
<text x="340" y="197" font-size="12" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">Filtra órgão, ordena por valor</text>

<line x1="340" y1="217" x2="340" y2="247" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="160" y="247" width="360" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="265" font-size="14" font-weight="500" fill="#085041" text-anchor="middle" dominant-baseline="central">Q2 — Fornecedores do órgão</text>
<text x="340" y="283" font-size="12" fill="#0F6E56" text-anchor="middle" dominant-baseline="central">Agrupa e soma valor total</text>

<line x1="340" y1="303" x2="340" y2="333" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="160" y="333" width="360" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="340" y="351" font-size="14" font-weight="500" fill="#712B13" text-anchor="middle" dominant-baseline="central">Q3 — Fornecedores multiórgão</text>
<text x="340" y="369" font-size="12" fill="#993C1D" text-anchor="middle" dominant-baseline="central">Conta órgãos distintos por fornecedor</text>

<line x1="340" y1="389" x2="340" y2="419" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="160" y="419" width="360" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="340" y="437" font-size="14" font-weight="500" fill="#712B13" text-anchor="middle" dominant-baseline="central">Q4 — Rede de mesmo endereço</text>
<text x="340" y="455" font-size="12" fill="#993C1D" text-anchor="middle" dominant-baseline="central">Travessia de múltiplos saltos</text>

<line x1="340" y1="475" x2="340" y2="505" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="160" y="505" width="360" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="340" y="523" font-size="14" font-weight="500" fill="#712B13" text-anchor="middle" dominant-baseline="central">Q5 — Caminho entre fornecedores</text>
<text x="340" y="541" font-size="12" fill="#993C1D" text-anchor="middle" dominant-baseline="central">Menor caminho na rede</text>

<line x1="340" y1="561" x2="340" y2="591" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="160" y="591" width="360" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="340" y="609" font-size="14" font-weight="500" fill="#712B13" text-anchor="middle" dominant-baseline="central">Q6/Q7 — Fracionamento e modalidade</text>
<text x="340" y="627" font-size="12" fill="#993C1D" text-anchor="middle" dominant-baseline="central">Travessia com filtro temporal</text>

<line x1="340" y1="647" x2="340" y2="677" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="160" y="677" width="360" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="695" font-size="14" font-weight="500" fill="#2C2C2A" text-anchor="middle" dominant-baseline="central">Relatório de risco gerado</text>
<text x="340" y="713" font-size="12" fill="#5F5E5A" text-anchor="middle" dominant-baseline="central">Padrões suspeitos sinalizados</text>

</svg>
